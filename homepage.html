<!DOCTYPE html>
<html>
    <head>
        <title>Home</title>
        <style>
      
          body{
            background-color: rgb(62, 0, 135);
          }

          .parent_flex{
            position : absolute;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            left: 50%;
            top: 50%;
            width: 1000px;
            height: 170px;
            margin-left : -500px;
            margin-top  : -85px;
          }

          .welcome_text{
            flex: 1;
            font-size: 65px;
            color: rgb(255, 222, 176);
            margin-bottom: 0px;
            margin-top: 0px;
          }

          .continue_button{
            flex: 2;
            font-size: 18px;
            font-family: monospace;
            background-color: rgb(255, 234, 206);
            max-height: 30%;
            width: 55%;
            cursor: pointer;
            border-radius: 15px;
            border-style: solid;
            border-color: rgb(0, 223, 7);
            border-width: 2.3px;
            transition: box-shadow 0.35s;
          }

          .continue_button:hover{
            box-shadow: 0 0 45px rgb(0, 240, 8);
          }

        </style>
    </head>
    <body>
      <div class="parent_flex">
        <p class="welcome_text">
          Hello&excl; Welcome to my portfolio &#58;&ndash;&rpar;
        </p>
        <button class="continue_button">
          click here to continue
        </button>
      </div>
    </body>
</html>
